apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sproj-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/arkad-mines/backend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
              ephemeral-storage: "256Mi"
            limits:
              memory: "512Mi"
          env:
            - name: MONGO_URI
              value: "mongodb://mongo-svc:27017/arkad_mines"
            - name: PORT
              value: "4000"
            - name: MONGO_CONNECT_MAX_ATTEMPTS
              value: "45"
            - name: MONGO_CONNECT_DELAY_MS
              value: "2000"
          startupProbe:
            httpGet:
              path: /live
              port: 4000
            periodSeconds: 5
            failureThreshold: 36
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 4000
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3